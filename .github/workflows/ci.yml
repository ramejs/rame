name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test
